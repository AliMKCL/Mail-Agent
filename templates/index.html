<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Agent</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="container">
        <!-- Messages Panel -->
        <div class="panel messages-panel">
            <div class="panel-header" id="messagesHeader">
                Messages
                <button class="sync-button" onclick="syncEmails()" id="syncBtn" disabled>Sync</button>
            </div>
            <!-- User Selection Buttons -->
            <div class="user-buttons" id="userButtons">
                <div class="loading">Loading users...</div>
            </div>
            <div class="panel-content" id="messagesPanel">
                <div class="messages-content" id="messagesContent">
                    <div class="loading">Select a user to view emails...</div>
                </div>
            </div>
        </div>

        <!-- Calendar Panel -->
        <div class="panel calendar-panel">
            <div class="panel-header" id="calendarHeader">
                Calendar
            </div>
            <div class="panel-content" id="calendarPanel">
                <div class="calendar-content">
                    Calendar view coming soon...
                </div>
            </div>
        </div>

        <!-- Categories Panel -->
        <div class="panel categories-panel">
            <div class="panel-header" id="categoriesHeader">
                Categories</div>
            <div class="panel-content" id="categoriesPanel">
                <div class="categories-content">
                    Email categories will appear here...
                </div>
            </div>
        </div>

        <!-- Reminders Panel -->
        <div class="panel reminders-panel">
            <div class="panel-header" id="remindersHeader">
                Reminders</div>
            <div class="panel-content" id="remindersPanel">
                <div class="reminders-content">
                    <!-- Grid of reminder cells -->
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let emails = [];
        let users = [];
        let currentUserId = null;

        // Format date for display
        function formatDate(dateString) {
            if (!dateString) return 'Unknown';

            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (days === 1) {
                return 'Yesterday';
            } else if (days < 7) {
                return `${days} days ago`;
            } else {
                return date.toLocaleDateString();
            }
        }

        // Truncate text with ellipsis
        function truncateText(text, maxLength) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        // Extract sender name from email address
        function extractSenderName(sender) {
            if (!sender) return 'Unknown';

            // Try to extract name from "Name <email@domain.com>" format
            const match = sender.match(/^(.+?)\s*<.+>$/);
            if (match) {
                return match[1].replace(/"/g, '').trim();
            }

            // If just email, return email
            return sender;
        }

        // Render user buttons
        function renderUserButtons() {
            const userButtons = document.getElementById('userButtons');

            let buttonsHtml = '';

            if (users.length === 0) {
                buttonsHtml = '<div class="loading">No users found. Click + to add Gmail accounts.</div>';
            } else {
                buttonsHtml = users.map(user => `
                    <button class="user-button ${currentUserId === user.id ? 'active' : ''}" 
                            onclick="selectUser(${user.id})" 
                            data-user-id="${user.id}">
                        ${user.email}
                    </button>
                `).join('');
            }

            // Always add the plus button
            buttonsHtml += `
                <button class="add-user-button" onclick="showAddUserModal()" title="Add Gmail Account">
                    <span class="plus-icon">+</span>
                </button>
            `;

            userButtons.innerHTML = buttonsHtml;
        }

        // Select a user and load their emails
        function selectUser(userId) {
            currentUserId = userId;
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = false;

            // Update button states
            renderUserButtons();

            // Load emails for this user
            loadEmails();
        }

        // Render emails in the messages panel
        function renderEmails() {
            const messagesContent = document.getElementById('messagesContent');

            if (!currentUserId) {
                messagesContent.innerHTML = '<div class="loading">Select a user to view emails...</div>';
                return;
            }

            if (emails.length === 0) {
                messagesContent.innerHTML = '<div class="loading">No emails found. Click Sync to fetch emails.</div>';
                return;
            }

            const emailsHtml = emails.map(email => `
                <div class="email-item" onclick="selectEmail('${email.id}')">
                    <div class="email-header">
                        <div>
                            <div class="email-subject">${truncateText(email.subject, 60)}</div>
                            <div class="email-sender">${extractSenderName(email.sender)}</div>
                        </div>
                        <div class="email-date">${formatDate(email.date_sent)}</div>
                    </div>
                    <div class="email-snippet">${truncateText(email.snippet, 120)}</div>
                </div>
            `).join('');

            messagesContent.innerHTML = emailsHtml;
        }

        // Load users from API
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                users = await response.json();
                renderUserButtons();

                // Auto-select first user if available
                if (users.length > 0 && !currentUserId) {
                    selectUser(users[0].id);
                }
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('userButtons').innerHTML =
                    '<div class="error">Error loading users. Please try again.</div>';
            }
        }

        // Load emails from API
        async function loadEmails() {
            if (!currentUserId) {
                renderEmails();
                return;
            }

            try {
                const response = await fetch(`/api/emails?user_id=${currentUserId}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                emails = await response.json();
                renderEmails();
            } catch (error) {
                console.error('Error loading emails:', error);
                document.getElementById('messagesContent').innerHTML =
                    '<div class="error">Error loading emails. Please try again.</div>';
            }
        }

        // Sync emails from Gmail
        async function syncEmails() {
            if (!currentUserId) {
                alert('Please select a user first');
                return;
            }

            const syncBtn = document.getElementById('syncBtn');
            const originalText = syncBtn.textContent;

            syncBtn.disabled = true;
            syncBtn.textContent = 'Syncing...';

            try {
                const response = await fetch(`/api/sync?user_id=${currentUserId}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                console.log('Sync result:', result);

                // Reload emails after sync
                await loadEmails();

                // Show success message briefly
                syncBtn.textContent = 'Done!';
                setTimeout(() => {
                    syncBtn.textContent = originalText;
                    syncBtn.disabled = currentUserId === null;
                }, 2000);

            } catch (error) {
                console.error('Error syncing emails:', error);
                syncBtn.textContent = 'Error';
                setTimeout(() => {
                    syncBtn.textContent = originalText;
                    syncBtn.disabled = currentUserId === null;
                }, 2000);
            }
        }

        // Select email (placeholder for future functionality)
        function selectEmail(emailId) {
            console.log('Selected email:', emailId);
            const email = emails.find(e => e.id === emailId);
            if (email) {
                // Could show email details in a modal or sidebar
                console.log('Email details:', email);
            }
        }

        // Show modal to add new Gmail account
        function showAddUserModal() {
            const modal = document.getElementById('addUserModal');
            modal.style.display = 'block';
            document.getElementById('emailInput').focus();
        }

        // Hide modal
        function hideAddUserModal() {
            const modal = document.getElementById('addUserModal');
            modal.style.display = 'none';
            document.getElementById('emailInput').value = '';
            document.getElementById('nameInput').value = '';
        }

        // Add new Gmail account
        async function addGmailAccount() {
            const email = document.getElementById('emailInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            const addButton = document.getElementById('addAccountBtn');

            if (!email) {
                alert('Please enter a Gmail address');
                return;
            }

            // Basic email validation
            if (!email.includes('@') || !email.includes('.')) {
                alert('Please enter a valid email address');
                return;
            }

            addButton.disabled = true;
            addButton.textContent = 'Adding...';

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        name: name || null
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                console.log('User added:', result);

                // Reload users and hide modal
                await loadUsers();
                hideAddUserModal();

                // Show success message
                alert(`Successfully added Gmail account: ${email}`);

            } catch (error) {
                console.error('Error adding user:', error);
                alert('Error adding Gmail account. Please try again.');
            } finally {
                addButton.disabled = false;
                addButton.textContent = 'Add Account';
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('addUserModal');
            if (event.target == modal) {
                hideAddUserModal();
            }
        }

        // Handle Enter key in modal
        function handleModalKeyPress(event) {
            if (event.key === 'Enter') {
                addGmailAccount();
            } else if (event.key === 'Escape') {
                hideAddUserModal();
            }
        }

        // Load users and emails when page loads
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>

    <!-- Add User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Gmail Account</h3>
                <span class="close" onclick="hideAddUserModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="emailInput">Gmail Address *</label>
                    <input type="email" id="emailInput" placeholder="user@gmail.com"
                        onkeypress="handleModalKeyPress(event)" required>
                </div>
                <div class="form-group">
                    <label for="nameInput">Display Name (optional)</label>
                    <input type="text" id="nameInput" placeholder="John Doe" onkeypress="handleModalKeyPress(event)">
                </div>
                <p class="modal-note">
                    Your browser will open for Gmail authentication after clicking "Add Account".
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-button cancel" onclick="hideAddUserModal()">Cancel</button>
                <button type="button" class="modal-button primary" id="addAccountBtn" onclick="addGmailAccount()">Add
                    Account</button>
            </div>
        </div>
    </div>
</body>

</html>
