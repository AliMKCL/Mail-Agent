<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Agent</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <div class="top-search-wrapper">
                <form id="topSearchForm" onsubmit="onTopSearchSubmit(event)" class="top-search-form">
                    <svg class="top-search-icon" viewBox="0 0 24 24">
                        <path
                            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99c.41.41 1.09.41 1.5 0s.41-1.09 0-1.5l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                        </path>
                    </svg>
                    <input id="AISearchInput" type="search" placeholder="Ask AI about your inbox and plans..."
                        aria-label="Ask AI" class="top-search-input" />
                </form>
            </div>
            <div class="top-bar-icons">
                <button class="icon-btn" title="Notifications">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10 3.17 10 4v.68C7.13 5.36 5.5 7.92 5.5 11v5l-1.7 1.7c-.14.14-.3.33-.3.53V19c0 .55.45 1 1 1h14c.55 0 1-.45 1-1v-.77c0-.2-.16-.39-.3-.53L18 16z">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" title="Profile">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8V21h19.2v-1.8c0-3.2-6.4-4.8-9.6-4.8z">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" title="Settings">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M19.43 12.98c.04-.32.07-.65.07-.98s-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.65l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.07 7.07 0 0 0-1.73-1l-.38-2.65A.5.5 0 0 0 12 2h-4a.5.5 0 0 0-.5.42l-.38 2.65a7.07 7.07 0 0 0-1.73 1l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.65l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.65l2 3.46a.5.5 0 0 0 .61.22l2.49-1c.54.42 1.12.77 1.73 1l.38 2.65A.5.5 0 0 0 8 22h4a.5.5 0 0 0 .5-.42l.38-2.65c.61-.23 1.19-.58 1.73-1l2.49 1a.5.5 0 0 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.65l-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

    </div>
    <div class="container">
        <!-- Messages Panel -->
        <div class="panel messages-panel">
            <div class="panel-header" id="messagesHeader">
                <div class="header-left">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M19 4H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 2v.01L12 13 5 6.01V6h14zm-7 7.99L5 6.01V18h14V6.01l-7 7.98z">
                        </path>
                    </svg>
                    <div class="header-title">Personal Inbox</div>
                </div>

                <button class="sync-button" onclick="syncEmails()" id="syncBtn" disabled>
                    <svg class="sync-icon" viewBox="0 0 24 24">
                        <path
                            d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.1-.9 2-2 2h-1v2h1c2.21 0 4-1.79 4-4 0-4.42-3.58-8-8-8zm-6 8c0-1.1.9-2 2-2h1V8H8c-2.21 0-4 1.79-4 4 0 4.42 3.58 8 8 8v3l4-4-4-4v3c-3.31 0-6-2.69-6-6z">
                        </path>
                    </svg>
                    Sync
                </button>
            </div>

            <!-- Account Dropdown and Search Bar Row -->
            <div class="account-search-row">
                <div class="account-dropdown-wrapper">
                    <div class="account-dropdown" id="accountDropdown">
                        <button class="account-dropdown-btn" id="accountDropdownBtn" onclick="toggleAccountDropdown()">
                            <span id="selectedAccountText">Account</span>
                            <svg class="dropdown-arrow" viewBox="0 0 24 24">
                                <path d="M7 10l5 5 5-5z"></path>
                            </svg>
                        </button>
                        <div class="account-dropdown-menu" id="accountDropdownMenu">
                            <div class="loading">Loading users...</div>
                        </div>
                    </div>
                </div>
                <div class="search-wrapper-messages">
                    <form id="titleSearchForm" onsubmit="onTitleSearchSubmit(event)" class="search-form-messages">
                        <svg class="search-icon" viewBox="0 0 24 24">
                            <path
                                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99c.41.41 1.09.41 1.5 0s.41-1.09 0-1.5l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                            </path>
                        </svg>
                        <input id="titleSearchInput" type="search" placeholder="Search subjects..."
                            aria-label="Search subjects" class="search-input-messages" />
                    </form>
                </div>
            </div>

            <div class="panel-content" id="messagesPanel">
                <div class="messages-content" id="messagesContent">
                    <div class="loading">Select a user to view emails...</div>
                </div>
            </div>
        </div>

        <!-- Calendar Panel -->
        <div class="panel calendar-panel">
            <div class="panel-header" id="calendarHeader">
                <svg class="calendar-icon" viewBox="0 0 24 24">
                    <path
                        d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V8h14v12zm0-14H5V6h14v2z">
                    </path>
                </svg>
                Calendar
            </div>
            <div class="panel-content" id="calendarPanel">
                <div class="calendar-content">
                    Calendar view coming soon...
                </div>
            </div>
        </div>

        <!-- Reminders Panel -->
        <div class="panel reminders-panel">
            <div class="panel-header" id="remindersHeader">
                <svg class="reminders-icon" viewBox="0 0 24 24">
                    <path
                        d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10 3.17 10 4v.68C7.13 5.36 5.5 7.92 5.5 11v5l-1.7 1.7c-.14.14-.3.33-.3.53V19c0 .55.45 1 1 1h14c.55 0 1-.45 1-1v-.77c0-.2-.16-.39-.3-.53L18 16z">
                    </path>
                </svg>
                Reminders
            </div>
            <div class="panel-content" id="remindersPanel">
                <div class="reminders-content">
                    <!-- Grid of reminder cells -->
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                    <div class="reminder-cell"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let emails = [];
        let users = [];
        let currentUserId = null;

        // Format date for display
        function formatDate(dateString) {
            if (!dateString) return 'Unknown';

            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (days === 1) {
                return 'Yesterday';
            } else if (days < 7) {
                return `${days} days ago`;
            } else {
                return date.toLocaleDateString();
            }
        }

        // Truncate text with ellipsis
        function truncateText(text, maxLength) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        // Extract sender name from email address
        function extractSenderName(sender) {
            if (!sender) return 'Unknown';

            // Try to extract name from "Name <email@domain.com>" format
            const match = sender.match(/^(.+?)\s*<.+>$/);
            if (match) {
                return match[1].replace(/"/g, '').trim();
            }

            // If just email, return email
            return sender;
        }

        // Render account dropdown
        function renderAccountDropdown() {
            const dropdownMenu = document.getElementById('accountDropdownMenu');
            const selectedAccountText = document.getElementById('selectedAccountText');

            let menuHtml = '';

            if (users.length === 0) {
                menuHtml = '<div class="dropdown-loading">No users found</div>';
            } else {
                menuHtml = users.map(user => `
                    <div class="dropdown-item ${currentUserId === user.id ? 'active' : ''}" 
                         onclick="selectUser(${user.id})" 
                         data-user-id="${user.id}">
                        ${user.email}
                    </div>
                `).join('');
            }

            // Always add the "Add Account" option
            menuHtml += `
                <div class="dropdown-separator"></div>
                <div class="dropdown-item add-account" onclick="showAddUserModal()">
                    <span class="plus-icon">+</span> Add Gmail Account
                </div>
            `;

            dropdownMenu.innerHTML = menuHtml;

            // Update selected account text
            if (currentUserId && users.length > 0) {
                const selectedUser = users.find(user => user.id === currentUserId);
                if (selectedUser) {
                    selectedAccountText.textContent = selectedUser.email;
                }
            } else {
                selectedAccountText.textContent = 'Account';
            }
        }

        // Select a user and load their emails
        function selectUser(userId) {
            currentUserId = userId;
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = false;

            // Update dropdown display
            renderAccountDropdown();

            // Close dropdown after selection
            closeAccountDropdown();

            // Load emails for this user
            loadEmails();
        }

        // Toggle account dropdown
        function toggleAccountDropdown() {
            const dropdownMenu = document.getElementById('accountDropdownMenu');
            const dropdownBtn = document.getElementById('accountDropdownBtn');

            if (dropdownMenu.classList.contains('show')) {
                closeAccountDropdown();
            } else {
                openAccountDropdown();
            }
        }

        // Open account dropdown
        function openAccountDropdown() {
            const dropdownMenu = document.getElementById('accountDropdownMenu');
            const dropdownBtn = document.getElementById('accountDropdownBtn');

            dropdownMenu.classList.add('show');
            dropdownBtn.classList.add('active');
        }

        // Close account dropdown
        function closeAccountDropdown() {
            const dropdownMenu = document.getElementById('accountDropdownMenu');
            const dropdownBtn = document.getElementById('accountDropdownBtn');

            dropdownMenu.classList.remove('show');
            dropdownBtn.classList.remove('active');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const dropdown = document.getElementById('accountDropdown');
            if (!dropdown.contains(event.target)) {
                closeAccountDropdown();
            }
        });

        // Render emails in the messages panel
        function renderEmails() {
            const messagesContent = document.getElementById('messagesContent');

            if (!currentUserId) {
                messagesContent.innerHTML = '<div class="loading">Select a user to view emails...</div>';
                return;
            }

            if (emails.length === 0) {
                messagesContent.innerHTML = '<div class="loading">No emails found. Click Sync to fetch emails.</div>';
                return;
            }

            const emailsHtml = emails.map(email => `
                <div class="email-item" onclick="selectEmail('${email.id}')">
                    <div class="email-header">
                        <div>
                            <div class="email-subject">${truncateText(email.subject, 60)}</div>
                            <div class="email-sender">${extractSenderName(email.sender)}</div>
                        </div>
                        <div class="email-date">${formatDate(email.date_sent)}</div>
                    </div>
                    <div class="email-snippet">${truncateText(email.snippet, 120)}</div>
                </div>
            `).join('');

            messagesContent.innerHTML = emailsHtml;
        }

        // Load users from API
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                users = await response.json();
                renderAccountDropdown();

                // Auto-select first user if available
                if (users.length > 0 && !currentUserId) {
                    selectUser(users[0].id);
                }
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('accountDropdownMenu').innerHTML =
                    '<div class="error">Error loading users. Please try again.</div>';
            }
        }

        // Load emails from API
        // Keep a backup of the full email list in emailsBackup so we can restore after clearing a search
        let emailsBackup = [];
        async function loadEmails() {
            if (!currentUserId) {
                renderEmails();
                return;
            }

            try {
                const response = await fetch(`/api/emails?user_id=${currentUserId}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                emails = await response.json();
                // Save backup copy for clearing search
                emailsBackup = Array.isArray(emails) ? emails.slice() : [];
                renderEmails();
            } catch (error) {
                console.error('Error loading emails:', error);
                document.getElementById('messagesContent').innerHTML =
                    '<div class="error">Error loading emails. Please try again.</div>';
            }
        }

        // Sync emails from Gmail
        async function syncEmails() {
            if (!currentUserId) {
                alert('Please select a user first');
                return;
            }

            const syncBtn = document.getElementById('syncBtn');
            const originalText = syncBtn.textContent;

            syncBtn.disabled = true;
            syncBtn.textContent = 'Syncing...';

            try {
                const response = await fetch(`/api/sync?user_id=${currentUserId}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                console.log('Sync result:', result);

                // Reload emails after sync
                await loadEmails();

                // Show success message briefly
                syncBtn.textContent = 'Done!';
                setTimeout(() => {
                    syncBtn.textContent = originalText;
                    syncBtn.disabled = currentUserId === null;
                }, 2000);

            } catch (error) {
                console.error('Error syncing emails:', error);
                syncBtn.textContent = 'Error';
                setTimeout(() => {
                    syncBtn.textContent = originalText;
                    syncBtn.disabled = currentUserId === null;
                }, 2000);
            }
        }

        // Select email (placeholder for future functionality)
        function selectEmail(emailId) {
            console.log('Selected email:', emailId);
            const email = emails.find(e => e.id === emailId);
            if (email) {
                // Could show email details in a modal or sidebar
                console.log('Email details:', email);
            }
        }

        // Show modal to add new Gmail account
        function showAddUserModal() {
            const modal = document.getElementById('addUserModal');
            modal.style.display = 'block';
            document.getElementById('emailInput').focus();
        }

        // Hide modal
        function hideAddUserModal() {
            const modal = document.getElementById('addUserModal');
            modal.style.display = 'none';
            document.getElementById('emailInput').value = '';
            document.getElementById('nameInput').value = '';
        }

        // Add new Gmail account
        async function addGmailAccount() {
            const email = document.getElementById('emailInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            const addButton = document.getElementById('addAccountBtn');

            if (!email) {
                alert('Please enter a Gmail address');
                return;
            }

            // Basic email validation
            if (!email.includes('@') || !email.includes('.')) {
                alert('Please enter a valid email address');
                return;
            }

            addButton.disabled = true;
            addButton.textContent = 'Adding...';

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        name: name || null
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                console.log('User added:', result);

                // Reload users and hide modal
                await loadUsers();
                hideAddUserModal();

                // Show success message
                alert(`Successfully added Gmail account: ${email}`);

            } catch (error) {
                console.error('Error adding user:', error);
                alert('Error adding Gmail account. Please try again.');
            } finally {
                addButton.disabled = false;
                addButton.textContent = 'Add Account';
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('addUserModal');
            if (event.target == modal) {
                hideAddUserModal();
            }
        }

        // Handle Enter key in modal
        function handleModalKeyPress(event) {
            if (event.key === 'Enter') {
                addGmailAccount();
            } else if (event.key === 'Escape') {
                hideAddUserModal();
            }
        }

        // Search by title (subject) - substring match, case-insensitive. Called on form submit or pressing Enter.
        function onTitleSearchSubmit(evt) {
            evt.preventDefault();
            const input = document.getElementById('titleSearchInput');
            const query = (input.value || '').trim().toLowerCase();
            if (!query) {
                // empty -> restore
                clearTitleSearch();
                return;
            }

            // Filter backup copy to avoid losing original list
            emails = emailsBackup.filter(e => (e.subject || '').toLowerCase().includes(query));
            renderEmails();
            // show clear button state
            document.getElementById('titleClearBtn').style.display = 'inline-block';
        }

        // Clear title search and restore all mails
        function clearTitleSearch() {
            document.getElementById('titleSearchInput').value = '';
            emails = emailsBackup.slice();
            renderEmails();
            document.getElementById('titleClearBtn').style.display = 'none';
        }

        // Wire Enter key and clear button visibility on load
        window.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('titleSearchInput');
            const clearBtn = document.getElementById('titleClearBtn');
            if (input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        // Let form submit handler handle it
                        return;
                    }
                });
                input.addEventListener('input', () => {
                    clearBtn.style.display = input.value ? 'inline-block' : 'none';
                });
            }
            if (clearBtn) clearBtn.style.display = 'none';
        });

        // Load users and emails when page loads
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>

    <!-- Add User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Gmail Account</h3>
                <span class="close" onclick="hideAddUserModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="emailInput">Gmail Address *</label>
                    <input type="email" id="emailInput" placeholder="user@gmail.com"
                        onkeypress="handleModalKeyPress(event)" required>
                </div>
                <div class="form-group">
                    <label for="nameInput">Display Name (optional)</label>
                    <input type="text" id="nameInput" placeholder="John Doe" onkeypress="handleModalKeyPress(event)">
                </div>
                <p class="modal-note">
                    Your browser will open for Gmail authentication after clicking "Add Account".
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-button cancel" onclick="hideAddUserModal()">Cancel</button>
                <button type="button" class="modal-button primary" id="addAccountBtn" onclick="addGmailAccount()">Add
                    Account</button>
            </div>
        </div>
    </div>
</body>

</html>
